apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hms-user-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/HospitalManagementSystem-HMS/Hospital-Management.git
    targetRevision: dev
    path: helm/services/user-service
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: hms-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    
