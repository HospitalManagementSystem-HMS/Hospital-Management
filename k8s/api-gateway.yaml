# api-gateway deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: suryaa112003/api-gateway:latest
        ports:
        - containerPort: 4000
        env:
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:5000"
        - name: USER_SERVICE_URL
          value: "http://user-service:5001"
        - name: APPOINTMENT_SERVICE_URL
          value: "http://appointment-service:5002"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:5004"
        - name: JWT_SECRET
          value: "your_jwt_secret"
---
# api-gateway service.yaml
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
  - port: 4000
    targetPort: 4000
