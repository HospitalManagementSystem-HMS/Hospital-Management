apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "appointment-service.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "appointment-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    blueGreen:
      activeService: {{ include "appointment-service.fullname" . }}-active
      previewService: {{ include "appointment-service.fullname" . }}-preview
      autoPromotionEnabled: false
  selector:
    matchLabels:
      app: {{ include "appointment-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "appointment-service.fullname" . }}
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "appointment-service.fullname" . }}-config
            - secretRef:
                name: {{ include "appointment-service.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
