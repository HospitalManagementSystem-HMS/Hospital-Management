services:
  mongodb:
    image: mongo:7.0
    container_name: hms-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=yourSecurePassword
    command: mongod --auth
    volumes:
      - mongodb_data:/data/db

  auth-service:
    build: ./services/auth-service
    container_name: hms-auth-service
    restart: unless-stopped
    environment:
      - PORT=4001
      - TZ=${TZ:-Asia/Kolkata}
      - MONGO_URI=mongodb://admin:yourSecurePassword@mongodb:27017/?authSource=admin
      - MONGO_DB_NAME=hms_auth
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_me}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - USER_SERVICE_URL=http://user-service:4002
      - SEED=${SEED:-true}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@hospital.local}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-Admin@12345}
      - SEED_DOCTOR_EMAIL=${SEED_DOCTOR_EMAIL:-doctor@hospital.local}
      - SEED_DOCTOR_PASSWORD=${SEED_DOCTOR_PASSWORD:-Doctor@12345}
      - SEED_DOCTOR_NAME=${SEED_DOCTOR_NAME:-Dr. Aisha Sharma}
      - SEED_DOCTOR_SPECIALIZATION=${SEED_DOCTOR_SPECIALIZATION:-General Physician}
      - SEED_PATIENT_EMAIL=${SEED_PATIENT_EMAIL:-patient@hospital.local}
      - SEED_PATIENT_PASSWORD=${SEED_PATIENT_PASSWORD:-Patient@12345}
      - SEED_PATIENT_NAME=${SEED_PATIENT_NAME:-Rahul Verma}
    depends_on:
      - mongodb

  user-service:
    build: ./services/user-service
    container_name: hms-user-service
    restart: unless-stopped
    environment:
      - PORT=4002
      - TZ=${TZ:-Asia/Kolkata}
      - MONGO_URI=mongodb://admin:yourSecurePassword@mongodb:27017/?authSource=admin
      - MONGO_DB_NAME=hms_user
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_me}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - AUTH_SERVICE_URL=http://auth-service:4001
      - APPOINTMENT_SERVICE_URL=http://appointment-service:4003
      - NOTIFICATION_SERVICE_URL=http://notification-service:4004
    depends_on:
      - mongodb
      - auth-service
      - notification-service

  appointment-service:
    build: ./services/appointment-service
    container_name: hms-appointment-service
    restart: unless-stopped
    environment:
      - PORT=4003
      - TZ=${TZ:-Asia/Kolkata}
      - MONGO_URI=mongodb://admin:yourSecurePassword@mongodb:27017/?authSource=admin
      - MONGO_DB_NAME=hms_appointment
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_me}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - AUTH_SERVICE_URL=http://auth-service:4001
      - USER_SERVICE_URL=http://user-service:4002
      - NOTIFICATION_SERVICE_URL=http://notification-service:4004
    depends_on:
      - mongodb
      - auth-service
      - user-service

  notification-service:
    build: ./services/notification-service
    container_name: hms-notification-service
    restart: unless-stopped
    environment:
      - PORT=4004
      - TZ=${TZ:-Asia/Kolkata}
      - MONGO_URI=mongodb://admin:yourSecurePassword@mongodb:27017/?authSource=admin
      - MONGO_DB_NAME=hms_notification
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_me}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - MED_REMINDER_TZ=${MED_REMINDER_TZ:-UTC}
      - FOLLOW_UP_POLL_SECONDS=${FOLLOW_UP_POLL_SECONDS:-60}
    depends_on:
      - mongodb

  api-gateway:
    build: ./services/api-gateway
    container_name: hms-api-gateway
    restart: unless-stopped
    environment:
      - PORT=8080
      - TZ=${TZ:-Asia/Kolkata}
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_me}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-dev_internal_key_change_me}
      - AUTH_SERVICE_URL=http://auth-service:4001
      - USER_SERVICE_URL=http://user-service:4002
      - APPOINTMENT_SERVICE_URL=http://appointment-service:4003
      - NOTIFICATION_SERVICE_URL=http://notification-service:4004
    depends_on:
      - auth-service
      - user-service
      - appointment-service
      - notification-service
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: hms-frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "3000:80"

  code-server:
    image: codercom/code-server:latest
    container_name: hms-code-server
    ports:
      - "8443:8080"
    volumes:
      - /home/ubuntu/Hospital:/home/coder/Hospital
    environment:
      - PASSWORD=yourEditorPassword
    restart: unless-stopped

volumes:
  mongodb_data:

