namespace: hms-dev
replicaCount: 1
image:
  repository: ghcr.io/hospitalmanagementsystem-hms/notification-service
  tag: latest
  pullPolicy: Always
service:
  type: ClusterIP
  port: 5004
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  PORT: "5004"
  MONGO_URI: "mongodb://admin:admin123@mongodb.hms-dev.svc.cluster.local:27017/hms_notification?authSource=admin"
  AUTH_SERVICE_URL: "http://auth-service.hms-dev.svc.cluster.local:5000"
  APPOINTMENT_SERVICE_URL: "http://appointment-service.hms-dev.svc.cluster.local:5002"
secrets:
  JWT_SECRET: "dev_super_secret_key_123"
  INTERNAL_API_KEY: "dev_internal_key_change_me"
