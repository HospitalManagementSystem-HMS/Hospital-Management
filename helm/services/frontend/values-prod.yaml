namespace: hms-prod
replicaCount: 1
image:
  repository: ghcr.io/hospitalmanagementsystem-hms/frontend
  tag: v1.1.0
  pullPolicy: Always
service:
  type: NodePort
  port: 3000
  nodePort: 30090
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
env:
  PORT: "3000"
  SERVICE_NAME: "frontend"
secrets:
  JWT_SECRET: "prod_secret_123"
  INTERNAL_API_KEY: "prod_internal_key"
