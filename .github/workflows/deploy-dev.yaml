name: Deploy Dev

on:
  repository_dispatch:
    types: [service-image-updated]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          token: ${{ secrets.GH_PAT }}

      - name: Install yq
        uses: mikefarah/yq@v4.44.1

      - name: Update values-dev.yaml
        run: |
          SERVICE="${{ github.event.client_payload.service_name }}"
          TAG="${{ github.event.client_payload.sha_tag }}"
          IMAGE="${{ github.event.client_payload.image }}"

          echo "Updating $SERVICE to $TAG"
          yq -i ".image.tag = \"$TAG\"" helm/$SERVICE/values-dev.yaml
          yq -i ".image.repository = \"${IMAGE%:*}\"" helm/$SERVICE/values-dev.yaml

          echo "SERVICE=$SERVICE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name ci-bot
          git config user.email ci@bot.com
          git add .
          git diff --staged --quiet || git commit -m "chore(dev): update $SERVICE → $TAG"
          git push

      - name: Notify — Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CI/CD Bot <${{ secrets.SMTP_USER }}>"
          subject: "✅ [Dev Deploy] ${{ env.SERVICE }} → ${{ env.TAG }}"
          body: |
            STATUS: SUCCESS

            Service   : ${{ env.SERVICE }}
            Image Tag : ${{ env.TAG }}
            Branch    : dev
            Actor     : ${{ github.actor }}

            values-dev.yaml updated and pushed.
            ArgoCD will now sync the dev cluster.

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notify — Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "CI/CD Bot <${{ secrets.SMTP_USER }}>"
          subject: "❌ [Dev Deploy] FAILED — ${{ env.SERVICE }}"
          body: |
            STATUS: FAILED

            Service   : ${{ env.SERVICE }}
            Image Tag : ${{ env.TAG }}
            Branch    : dev

            values-dev.yaml was NOT updated.
            ArgoCD has NOT deployed the new image.

            Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}