namespace: hms-prod
replicaCount: 1
image:
  repository: ghcr.io/hospitalmanagementsystem-hms/appointment-service
  tag: stable
  pullPolicy: Always
service:
  type: ClusterIP
  port: 5002
  
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
env:
  PORT: "5002"
  SERVICE_NAME: "appointment-service"
secrets:
  JWT_SECRET: "prod_secret_123"
  INTERNAL_API_KEY: "prod_internal_key"
