apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: hms-routes
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: hms-gateway
    namespace: {{ .Values.namespace }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/
    backendRefs:
    - name: api-gateway
      port: 4000
  - matches:
    - path:
        type: PathPrefix
        value: /socket.io/
    backendRefs:
    - name: api-gateway
      port: 4000
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: frontend
      port: 80