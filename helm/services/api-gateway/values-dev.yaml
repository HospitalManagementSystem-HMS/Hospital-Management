namespace: hms-dev
replicaCount: 1
image:
  repository: suryaa112003/api-gateway
  tag: latest
  pullPolicy: Always
service:
  type: NodePort
  port: 4000
  nodePort: 30081
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
env:
  PORT: "4000"
  SERVICE_NAME: "api-gateway"
secrets:
  JWT_SECRET: "dev_secret_123"
  INTERNAL_API_KEY: "dev_internal_key"
